name: govbot-bluesky-transportation

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: govbot-bluesky-transportation
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Verify script exists
        run: |
          ls -la scripts/
          test -f scripts/post_to_bluesky.py && echo "OK" || (echo "MISSING" && exit 1)

      - name: Install govbot, fetch all 50 states + DC + PR, dump JSONL
        # ~2-3 GB total. Govbot will skip any state code it doesn't have a
        # scraper for, so this is safe to leave even if a state is missing.
        # Edit the state list below to add/remove states.
        run: |
          curl -fsSL https://raw.githubusercontent.com/chihacknight/govbot/main/actions/govbot/scripts/install-nightly.sh | bash
          export PATH="$HOME/.govbot/bin:$PATH"
          govbot --version || true
          govbot clone \
            al ak az ar ca co ct de fl ga \
            hi id il in ia ks ky la me md \
            ma mi mn ms mo mt ne nv nh nj \
            nm ny nc nd oh ok or pa ri sc \
            sd tn tx ut vt va wa wv wi wy \
            dc pr
          govbot logs > bills.jsonl
          echo "bills.jsonl is $(wc -l < bills.jsonl) lines"

      - name: Filter, summarize, and post to Bluesky
        env:
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          POST_LIMIT: "5"
        run: python scripts/post_to_bluesky.py

      - name: Commit state changes
        run: |
          git config user.name  "govbot-bluesky[bot]"
          git config user.email "govbot-bluesky[bot]@users.noreply.github.com"
          git add state/posted.json || true
          if git diff --cached --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "chore: update posted state [skip ci]"
            git push
          fi
