name: govbot-bluesky-transportation

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: govbot-bluesky-transportation
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Verify script exists
        run: |
          echo "Listing scripts/ folder:"
          ls -la scripts/
          echo "Confirming the file we will run:"
          test -f scripts/post_to_bluesky.py && echo "OK: scripts/post_to_bluesky.py exists" || (echo "MISSING: scripts/post_to_bluesky.py" && exit 1)

      - name: Install govbot, fetch IL data, dump JSONL
        run: |
          curl -fsSL https://raw.githubusercontent.com/chihacknight/govbot/main/actions/govbot/scripts/install-nightly.sh | bash
          export PATH="$HOME/.govbot/bin:$PATH"
          govbot --version || true
          govbot clone il in
          govbot logs > bills.jsonl
          echo "bills.jsonl is $(wc -l < bills.jsonl) lines"

      - name: Debug — peek at bills.jsonl
        run: |
          echo "=== First 3 records (truncated to 500 chars each) ==="
          head -3 bills.jsonl | cut -c1-500
          echo ""
          echo "=== All bill identifiers in this run ==="
          python -c "
          import json
          with open('bills.jsonl') as f:
              for line in f:
                  try:
                      r = json.loads(line)
                      bill = r.get('bill') or {}
                      log = r.get('log') or {}
                      action = log.get('action') or {}
                      print(f\"{bill.get('identifier','?'):10} | {action.get('date','?'):12} | {bill.get('title','?')[:80]}\")
                  except: pass
          "
          echo ""
          echo "=== Lines mentioning common transportation terms ==="
          grep -ciE 'transit|transport|highway|rail|bicycle|vehicle|traffic' bills.jsonl || echo "0 matches"

      - name: Filter, summarize, and post to Bluesky
        env:
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          POST_LIMIT: "3"
        run: python scripts/post_to_bluesky.py

      - name: Commit state changes
        run: |
          git config user.name  "govbot-bluesky[bot]"
          git config user.email "govbot-bluesky[bot]@users.noreply.github.com"
          git add state/posted.json || true
          if git diff --cached --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "chore: update posted state [skip ci]"
            git push
          fi
