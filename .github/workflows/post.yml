name: govbot-bluesky-transportation

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: govbot-bluesky-transportation
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Verify script exists
        run: |
          ls -la scripts/
          test -f scripts/post_to_bluesky.py && echo "OK" || (echo "MISSING" && exit 1)

      - name: Install govbot, fetch all supported states, dump JSONL
        # Clone each state one-at-a-time. Govbot panics on unsupported states,
        # so we wrap each call in `|| echo "skipped"` to keep going. After the
        # first successful run you'll see in the log which states are supported
        # vs which ones were skipped.
        run: |
          curl -fsSL https://raw.githubusercontent.com/chihacknight/govbot/main/actions/govbot/scripts/install-nightly.sh | bash
          export PATH="$HOME/.govbot/bin:$PATH"
          govbot --version || true

          STATES="al ak az ar ca co ct de fl ga hi id il in ia ks ky la me md ma mi mn ms mo mt ne nv nh nj nm ny nc nd oh ok or pa ri sc sd tn tx ut vt va wa wv wi wy dc pr"
          SUCCESSFUL=""
          SKIPPED=""
          for state in $STATES; do
            echo "--- Cloning $state ---"
            if govbot clone "$state" 2>&1; then
              SUCCESSFUL="$SUCCESSFUL $state"
            else
              echo "  SKIPPED $state (not supported by govbot)"
              SKIPPED="$SKIPPED $state"
            fi
          done

          echo ""
          echo "=========================================="
          echo "Supported states (cloned successfully):"
          echo " $SUCCESSFUL"
          echo ""
          echo "Skipped states (not in govbot):"
          echo " $SKIPPED"
          echo "=========================================="

          govbot logs > bills.jsonl
          echo "bills.jsonl is $(wc -l < bills.jsonl) lines"

      - name: Filter, summarize, and post to Bluesky
        env:
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          POST_LIMIT: "5"
        run: python scripts/post_to_bluesky.py

      - name: Commit state changes
        run: |
          git config user.name  "govbot-bluesky[bot]"
          git config user.email "govbot-bluesky[bot]@users.noreply.github.com"
          git add state/posted.json || true
          if git diff --cached --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "chore: update posted state [skip ci]"
            git push
          fi
