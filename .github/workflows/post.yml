name: govbot-bluesky-transportation

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: govbot-bluesky-transportation
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Verify script exists
        run: |
          echo "Listing scripts/ folder:"
          ls -la scripts/
          test -f scripts/post_to_bluesky.py && echo "OK: scripts/post_to_bluesky.py exists" || (echo "MISSING: scripts/post_to_bluesky.py" && exit 1)

      - name: Install govbot, fetch Midwest data, dump JSONL
        run: |
          curl -fsSL https://raw.githubusercontent.com/chihacknight/govbot/main/actions/govbot/scripts/install-nightly.sh | bash
          export PATH="$HOME/.govbot/bin:$PATH"
          govbot --version || true
          # Midwest + adjacent states. Add or remove codes here as you like.
          govbot clone il in mi wi oh ia mn mo
          govbot logs > bills.jsonl
          echo "bills.jsonl is $(wc -l < bills.jsonl) lines"

      - name: Debug — peek at bills.jsonl
        run: |
          echo "=== Total lines ==="
          wc -l bills.jsonl
          echo ""
          echo "=== Lines mentioning common transportation terms ==="
          grep -ciE 'transit|transport|highway|rail|bicycle|vehicle|traffic|infrastructure|bridge|truck|motor|toll|airport' bills.jsonl || echo "0 matches"

      - name: Filter, summarize, and post to Bluesky
        env:
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          POST_LIMIT: "3"
        run: python scripts/post_to_bluesky.py

      - name: Commit state changes
        run: |
          git config user.name  "govbot-bluesky[bot]"
          git config user.email "govbot-bluesky[bot]@users.noreply.github.com"
          git add state/posted.json || true
          if git diff --cached --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "chore: update posted state [skip ci]"
            git push
          fi
