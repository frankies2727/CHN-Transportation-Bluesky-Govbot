    match: ["sales tax", "use tax"]
  - emoji: "🧾"
    match: ["income tax", "tax bracket", "tax rate"]
  - emoji: "🏢"
    match: ["corporate tax", "corporate income tax", "franchise tax", "tax abatement", "tax increment financing", "TIF district"]
  - emoji: "👶"
    match: ["child tax credit", "earned income tax credit", "EITC"]
  - emoji: "🪦"
    match: ["estate tax", "inheritance tax", "gift tax"]
  - emoji: "⛏️"
    match: ["severance tax"]
  - emoji: "🚬"
    match: ["tobacco tax", "alcohol tax", "sugar tax", "soda tax"]

digest:
